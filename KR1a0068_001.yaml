body:
  text: 讀易私言元許衡撰初初位之下事之始也以陽居之才可以有為矣或恐其不安於分也以隂居之不患其過越矣或恐其愞弱昬滯未足以趨時也四之應否亦𩔖此義大抵柔弱則難濟剛健則易行故諸卦柔弱而致凶者其數居多剛健而致凶者惟頤大壯夬而已若緫言之居初者易貞居上者難貞易貞者由其所適之道多難貞者以其所處之位極故六十四卦初爻多得免咎而上每有不可救者始終之際其難易之不同葢如此艮六居初者凡八隂柔處下而其性好止故在謙則合時義而得吉在咸則感未深而不足進也以是才居遯則後於人而有厲然位卑力弱反不若不往之為愈也蹇之時險在前也止而不往自有知幾之譽勉於進則陷乎險也艮以止於初為義故但戒以利永貞漸之才冝若此也雖小子有言於義何咎旅雖有應而不足援也斯其所以瑣乎小過冝下而反應於上斯其有飛鳥之凶乎柔止之才大率不冝動而有應動而有應則應反為之累矣坤六居初者凡八坤柔順處下其初甚微而其積甚著故其處比與否之初也皆𫉬吉豫有應在上是動於欲而不安其分也凶亦冝乎二二與四皆隂位也四雖得正而猶有不中之累况不得其正乎二雖不正而猶有得中之羙况正而得中者乎四近君之臣也二逺君之臣也其勢又不同此二之所以多譽四之所以多懼也二中位隂陽處之皆為得中中者不偏不倚無過不及之謂其才若此故於時義為易合時義既合則吉可斷矣究而言之凡為陽者本吉也陽雖本吉不得其正則有害乎其吉矣雖得正矣不及其中亦未可保其吉也必也當位居中能趨時義然後其吉乃定凡為隂者本凶也隂雖本凶不失其正則緩乎其凶矣茍或居中猶可免其凶也必也不正不中悖於時義然後其凶乃定故陽得位得中者其吉多焉隂失位失中者其凶多焉要其終也合於時義則無不吉悖於時義則無不凶也大矣哉時之義乎凡陽本吉凡隂本凶陽雖本吉不得其正則害乎吉矣得正矣不及其中亦未保其吉也必當位居中能趨時義然後其吉乃定隂雖本凶不失其正則緩其凶矣失正矣或能居中猶可免其凶也必也不正不中悖於時義然後其凶乃定故陽得位得中其吉多焉隂失位失中其凶多焉要其終也合於時義則無不吉悖於時義則無不凶也大矣哉時之義乎乾九二九剛健之才也而承乘又剛健是剛健之至也處隂得中有溥博淵泉時出之義臣才若此其於職位蓋綽綽然有餘裕矣夫剛健則有可久之義得中則有適時之義兼二者而得雖無應可也况五六虚中以待已者乎此八卦所以無悔吝而有應者尤為羙也兊九二兊之九二剛而得中也雖上承於柔邪不足為累此以得中之義為務也獨節之為卦自有中義所不足者正而已今既不正矣其何以免於凶乎巽九二兊之中以剛為說巽之中以剛為入皆有才適用之中也然兊務於上巽務於下其勢有所不通如井之義貴於上行也而九二無應狥已才而下之違時拂義人莫肯與以谷射甕敝取象其亦冝乎坎九二下柔險之始也上柔險之極也而已以剛陽之才獨處中焉是已無頼於彼而彼有待於已也加以至尊應之則險道大行不爾則幾於困矣大率有應而道行則以貞幹之義為重無應而處中則以湏守之義為重錯舉而言則卦才皆備焉坤六二否之時不為窮厄所動豫之時不為逸欲所牽非安於義分者莫能也坤六二居中履正且又静而順焉冝其處此而無敗也雖然創物兼人陽之為也柔順貞静隂之徳也以隂之徳而遇剥觀則剥傷於柔而觀失於固矣夫何故時既不同義亦隨異此六爻所以貴中正而中正之中又有隨時之義也震六二六二隂柔而在動體雖居中履正然下乘剛陽成卦之主其勢不得安而處也非惟其勢不得安而處揆其資性亦不肯安其處也或上應或下依有失得之辨焉復無應而下仁吉之道也過此則違道而非正矣益之方受彼也上下之來又何患焉无妄之世方存誠也或應或依秪足為累他卦皆以乘剛之義為重也大率處則乗剛動有得失非坤二柔中之比也艮六二以剛處上以柔處下尊卑之勢順也艮之大體既備此象矣而六二又承剛履柔居中得正冝其處諸卦而無過也雖然柔止之才動拘禮制若當大有為之時則有不可必者固在蹇未能濟處艮莫能止究其用心忠義正直終不可以事之成否為累也離六二初與三剛而得正皆有為之才也然其明照各滯一偏唯六二中正見義理之當然而其才幹有不逮其明者甚矣才智之難齊也得有應於上則明有所附矣然非剛之善用明實明之能自用也大抵以剛用明不若以明用剛之為順故八卦應五附三其勢略等而離之六五有應於下者為最羙也三卦爻六位唯三為難處蓋上下之交内外之際非平易安和之所也故在乾則失於剛暴在坤則傷於柔邪震動而無恒巽躁而或屈離與艮明止係於一偏坎與兊險說至於過極皆凶之道也然乾之健雖不中也猶可勝任坤之順雖不正也猶能下人二者之凶比他爻為少緩若夫坎之與兊以隂處陽以柔乗剛不中不正悖忤時義其為凶内切矣是知乾坤為輕坎兊為重緫而論之亦曰多凶而已矣乾九三過剛而不中難與義適然以其有才也故諄諄焉戒命之曰夕惕曰敬慎曰艱貞庶乎有可免者不然則用所偏而違乎義矣凶其可逃乎四四之位近君多懼之地也以柔居之則有順從之羙以剛居之則有僭逼之嫌然又須問居五者隂邪陽邪以隂承陽則得於君而勢順以陽承隂則得於君而勢逆勢順則無不可也勢逆則尤忌上行上行則凶咎必至離之諸四皆是也震則四為成卦之主才幹之臣也是動而知戒是以有補過之道以陽乗陽以隂乗隂皆不得於君也然陽以不正而有才隂以得正而無才故其勢不同有才而不正則貴於寡欲故乾之諸四例得免咎而隨之四夬之四有凶悔之辭焉無才而得正則貴乎有應故艮之諸四皆以有應為優無應為劣獨坤之諸四能以柔順處之雖無應援亦皆免咎此又隨時之義也乾九四九而居四勢本不順然以其健而有才焉故不難於趨義又上卦之初未至過極故多為以剛用柔之義以剛而用柔是有才而能戒懼也有才而能戒懼雖不正猶吉也兊九四處下而說則有樂天之羙處上而說則有慕爵之嫌初九雖無應猶可也九四雖有應尚多戒辭也然以剛說之才易得勝任故有應者無不吉而無應者亦有免之之道云離九四陽處近君而能保其吉者以其有才而敬慎故也火性上炎動成躁急非惟不順君之所用且反為君之所忌也恣横專偪鮮有不及唯噬嗑之去間睽離之相保與羈旅而親寡之時取君義為甚輕故其所失亦比他爻為甚緩究而言之固非本善之才也震九四離之成卦在乎中故以中為羙震之成卦在乎下故以下為貴若是則震之九四乃才幹之臣也君之動由之師之動亦由之其功且大矣其位巳逼矣然而卒保其無禍者何哉蓋震而近臣君有戒慎恐懼之義以陽處隂有體剛用柔之義持其術以往其多功而寡過也冝乎雖然功大位逼而不正不可以久居其所也久居其所則勲徳反下此恒之所以戒於田無禽歟巽六四隂柔之質自多懼也順入之才能承君也以是而處每堪其任故八卦端無凶悔之辭坎六四其以隂柔得位而上承中正之君略與巽同然又有險之性焉以此處多懼之地則冝矣故八卦亦無凶悔之辭艮六四以柔止之才承柔止之君雖已身得正而於君事則有不能自濟者必藉剛陽之才而後可以成功故離九應之則終得㛰媾震九應之則顛頤𫉬吉至於止乾之健納兊之說皆可成功而有喜不爾處剥見凶處蒙蠱見吝矣艮以能止為義能止其身則无咎可也坤六四坤之六四不問有應與否皆無凶咎蓋為臣之道大體主順不順則無以事君也五五上卦之中乃人君之位也諸爻之徳莫精於此故在乾則剛健而斷在坤則重厚而順未或有先之者至於坎險之孚誠離麗之文明巽順於理艮篤於實能首出乎庶物不問何時克濟大事𫝊謂五多功者此也獨震忌強輔兊比小人於君道未善觀其戒之之辭則可知乾九五剛健中正得處君位不問何時皆無悔咎惟履之剛決同人之私暱不合君道故有厲有號咷也兊九五下履不正之強輔上比柔邪之小人非君之善道也然以其中正也故下有忌而可勝上有說而可決大哉中正之為徳乎離六五強輔強師而六以文明柔中之才而麗之悔可亡也事可濟也然更得九二應之為貴故大有睽鼎未濟皆吉而他卦止以得中為免耳震六五九四陽剛不正之臣為動之主而六五以柔中乘之其勢可嫌也得九二剛中應之其勢頗振動故恒大壯解歸妹比他卦為優而豐之二五以明動相資故其辭亦異焉勝於豫震小過之无應也巽九五以巽順處中正又君臣相得而剛柔相濟相得則無内難相濟則有成功不待於應自可无咎應則尤為羙也以巽順之道處中正之位君與臣相得也剛與柔相濟也相得則無内起之難相濟則有成功之理不待於應而自能无咎也坎九五以剛陽之才處極尊之位中而且正可以有為也然適在險中未能遽出故諸卦皆有須待之義夫能為者才也得為者位也可為者時也有才位而無其時唯待為可待而至於可則无咎矣艮六五君輔皆柔且無相得之義本不可有為也以六有静止得中之才上依而下任也故僅能成功然非可大有為也更或無應是不得於臣又不得於民於君道何取焉坤六五坤六居五雖不當位然柔順重厚合於時中有君人之度焉得九二剛中應之則事乃可濟故師泰臨升或吉或无咎而他卦則戒之之辭為尤重蓋隂柔之才不克大事且鮮能永貞故也上上事之終時之極也其才之剛則柔内之應否雖或取義然終莫及上與終之重也是故難之將出者則指其可由之方事之既成者則示以可保之道時甚足貴也時過適則難與行也義之善或不必勸則直云其吉也勢之惡或不可解則但言其凶也有始不得志而終无咎者有始饜其欲而終有禍敗者執其偏而用者才尚可也反其常而動者事巳窮也質雖不羙而冀其或改焉則猶告之位雖處極而見其可行焉則亦諭之艮有成終之義故八卦皆善履繫於所履觀繫於所生吉凶不敢主言也大抵積微而盛過盛而衰有不可變者有不能不變者六爻教戒之辭唯此為最少大𫝊謂其上易知豈非事之已成乎讀易私言
