body:
  text: 讀易私言易類提要臣等謹案讀易私言一卷元許衡撰衡字平仲河內人官至集賢殿大學士兼國子祭酒諡文正事迹具元史其書論六爻之德位大旨多發明繫辭傳同功異位柔危剛勝之義而又類聚各卦畫之居于六位者分别觀之蓋健順動止入説陷麗之吉凶悔吝又視乎所值之時而必以正且得中為上孔子彖象傳每以當位不當位得中行中為言衡所發明蓋本斯旨此書本在衡文集中元蘇天爵文類明劉昌中州文表皆載之國朝曹溶採入學海類編通志堂刋九經解遂從舊本收入而何焯校正九經解目録以為即元李簡之書今考簡所撰學易編其書具在未嘗與此書相復且永樂大典所載亦作許衡則非李簡書明甚焯之所校不知何以云然也乾隆四十年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e5e86b4b44fb93ce7fd5d5facb191b2094bcc21656d53ccad5a702b689b0f956
